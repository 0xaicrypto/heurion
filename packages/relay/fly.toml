# fly.toml app configuration file generated for nexus-email-relay on 2026-06-07T11:25:38+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nexus-email-relay'
primary_region = 'fra'

[build]

[env]
  AUDIT_DB_PATH = '/data/audit.db'
  DAILY_LIMIT_PER_USER = '10'
  PORT = '8443'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8443
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
