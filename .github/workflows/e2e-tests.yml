name: E2E Browser Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}
      - name: Seed data + run E2E
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=15 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            export NVM_DIR=\"\$HOME/.nvm\" && [ -s \"\$NVM_DIR/nvm.sh\" ] && . \"\$NVM_DIR/nvm.sh\"
            cd ~/heurion/packages/server-ts
            git fetch origin main && git reset --hard origin/main

            # Build web frontend so staging server can serve it via @fastify/static
            (cd ~/heurion/packages/web && pnpm install --frozen-lockfile 2>/dev/null || pnpm install) &
            WEB_PID=\$!

            # Install backend deps (includes playwright)
            pnpm install --prefer-offline

            # Wait for web build
            wait \$WEB_PID 2>/dev/null || true
            cd ~/heurion/packages/web && pnpm build && cp -rf dist ~/heurion/packages/server-ts/web-dist

            cd ~/heurion/packages/server-ts

            # Restart staging server to pick up web-dist + latest code
            pm2 restart heurion-staging 2>/dev/null || pm2 start npx --name heurion-staging -- tsx src/main.ts
            # Wait for server to become healthy
            for i in \$(seq 1 20); do
              curl -sf http://127.0.0.1:8002/healthz >/dev/null 2>&1 && break
              echo \"  waiting for staging... \$i\"
              sleep 3
            done
            curl -sf http://127.0.0.1:8002/healthz || { echo 'STAGING DOWN'; pm2 logs heurion-staging --lines 50 --nostream; exit 1; }

            # Seed test data
            npx tsx tests/fixtures/seed.ts http://127.0.0.1:8002

            # Install chromium browser (one-time)
            npx playwright install chromium 2>/dev/null || true

            # Run tests
            npx playwright test --config=playwright.config.ts
          "
